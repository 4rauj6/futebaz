<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTEBAZ!</title>

    <link rel="stylesheet" href="futebaz.css">
    <script src="futebaz.js" defer></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" /> 
</head>
<body>
    <header class="header-container">
        <button class="menu-button">
            <i class="fa-solid fa-bars"></i>
        </button>

        <nav class="header-nav">
            <ul>
                <li><a href="">Home</a></li>
                <li><a href="#home">Montar time</a></li>
                <li><a href="#about">Sobre</a></li>
            </ul>
        </nav>
    </header>

    <section id="home">
        <div class="main-container">
            <h1>FUTEBAZ!</h1>
            <p>O APP para paladeiros!</p>
            
            <div class="team-container">
                <div class="team-template">
                    <button id="open-team-modal">Criar time</button>
                </div>

                <div class="create-team-modal">
                    <div class="modal-body">
                        <h2>Criação de time</h2>
                        <p>Insira as informações do seu time:</p>

                        <p id="error"></p>

                        <form action="" class="team-creator-form">
                            <label for="team-name">Digite o nome do time: </label>
                            <input type="text" id="team-name" placeholder="Time 1">
                            
                            <label for="team-color">Selecione a cor do time: </label>
                            <input type="color" id="team-color" value="#00000">

                            <label for="team-players">Digite os nomes dos jogadores do time: </label>
                            <input type="text" id="team-players" placeholder="Jogador 1">

                            <label for="player-position">Selecione a posição do jogador: </label>
                            <select name="player-position" id="player-position">
                                <option value="Goleiro">Goleiro</option>
                                <option value="Defensor">Defensor</option>
                                <option value="Meio-campista">Meio-campista</option>
                                <option value="Atacante">Atacante</option>
                            </select>

                            <button type="submit">Criar time</button>
                            <button type="button" id="close-team-modal">Cancelar</button>
                        </form>
                    </div>
                </div>

                <table id="team-info-table">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Posição</th>
                            <th>Time</th>
                            <th>Cor</th>
                        </tr>
                    </thead>

                    <tbody id="team-info-body">
                    </tbody>
                </table>

                <button class="start-match">Iniciar partida</button>

                <div class="match-details">
                    <h2>Informações da partida</h2>

                    <div class="team-names">
                        <p id="team-1"></p>
                        <p>x</p>
                        <p id="team-2"></p>
                    </div>
                    
                    <label for="match-time">Placar de partida</label>
                    <input type="number" id="team-1-score">
                    <input type="number" id="team-2-score">
                </div>
            </div>

            <div class="last-squad-container">
                <h2>Últimos times criados</h2>

                <table id="last-squad-table"></table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Resultado</th>
                        </tr>
                    </thead>
                </table>
            </div>
        </div>
    </section>
</body>
</html>
